name: Deploy ollybray.com to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'ollybray.com/**'
  workflow_dispatch:   # allows manual trigger from the Actions tab

jobs:
  deploy:
    name: Push to ollybray99/ollybray.com
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      # Copy just the ollybray.com subfolder into a temp directory,
      # then push it as the full contents of the target repo.
      - name: Push subfolder to ollybray99/ollybray.com
        uses: cpina/github-action-push-to-another-repository@main
        env:
          # Create a Personal Access Token on the ollybray99 account with
          # "Contents: read & write" scope, then add it as a repository
          # secret called OLLYBRAY_DEPLOY_TOKEN in threeaimservices/ab4ent:
          #   Settings → Secrets and variables → Actions → New repository secret
          API_TOKEN_GITHUB: ${{ secrets.OLLYBRAY_DEPLOY_TOKEN }}
        with:
          source-directory: ollybray.com
          destination-github-username: ollybray99
          destination-repository-name: ollybray.com
          target-branch: main
          commit-message: "Deploy from threeaimservices/ab4ent — ${{ github.sha }}"
          user-email: deploy@ollybray.com
          user-name: ollybray99
